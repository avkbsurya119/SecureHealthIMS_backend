# SecureHealthIMS Backend CI Pipeline
# Runs on every push and pull request to main branch
# Quality gates: Security Audit, Syntax Check, Integration Tests

name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --production --audit-level=high
        continue-on-error: true

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check server.js syntax
        run: node --check src/server.js

      - name: Check app.js syntax
        run: node --check src/app.js

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [syntax-check]
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NODE_ENV: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database connectivity test
        run: node scripts/db_test.js
        continue-on-error: true

      # Uncomment when more tests are added
      # - name: Run JWT verification test
      #   run: node scripts/verify_jwt_login.js
      #   continue-on-error: true

  # Health check after deployment (runs only on main branch push)
  health-check:
    name: Production Health Check
    runs-on: ubuntu-latest
    needs: [security-audit, syntax-check, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for Render deployment
        run: sleep 60

      - name: Check API health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://securehealthims-backend.onrender.com/api/health)
          if [ "$response" = "200" ]; then
            echo "Health check passed!"
          else
            echo "Health check failed with status: $response"
            exit 1
          fi
        continue-on-error: true
